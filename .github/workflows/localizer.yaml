name: Localization Files

on:
  workflow_dispatch:

jobs:
  localizer:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Checkout (TranslationCatalog)
      uses: actions/checkout@v6
      with:
        repository: richardpiazza/TranslationCatalog
        path: tools

    - name: Build Tools
      shell: bash
      working-directory: ./tools
      run: |
        swift build

    - name: Generate
      shell: bash
      working-directory: ./tools
      run: |
        mkdir -p ../artifacts/en.lproj
        swift run localizer export apple en --storage filesystem --path ../Catalog > ../artifacts/en.lproj/Localizable.strings
        swift run localizer syntax --style swift-ui --storage filesystem --path ../Catalog > ../artifacts/LocalizedStringKey+Lingua.swift

    - name: Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: localization-artifacts
        path: |
          artifacts/
        retention-days: 7
