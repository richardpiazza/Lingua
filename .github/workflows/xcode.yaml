name: Xcode Project

on:
  workflow_dispatch:

jobs:
  Build-Test:
    runs-on: macOS-26
    env:
      XCODE_PROJECT: "Lingua"
      XCODE_SCHEME: "Lingua"
      XCODE_TARGET: "Lingua"
      XCODE_CONFIGURATION: "Debug"
      XCODE_SDK: "Debug"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Keychain & Certificate
        uses: ./.github/actions/certificate
        with:
          certificate-base64: ${{ secrets.CERTIFICATE_BASE64 }}
          certificate-password: ${{ secrets.CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build
        if: ${{ success() }}
        uses: ./.github/actions/build

      - name: Test
        if: ${{ success() }}
        uses: ./.github/actions/test
