name: Merge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_ID: '1568859223'
  ARCHIVE_PATH: 'Lingua.xcarchive'
  AUTH_KEY_ID: '4K335P848P'
  AUTH_KEY_ISSUER_ID: '69a6de71-72d5-47e3-e053-5b8c7c11a4d1'
  AUTH_KEY_NAME: 'AuthKey_4K335P848P.p8'
  AUTH_KEY_PATH: 'private_keys'
  DERIVED_DATA: 'derivedData'
  DESTINATION: 'generic/platform=macOS'
  DEVELOPMENT_TEAM: 'EX6YK9HKXA'
  EXPORT_PATH: 'export'
  PROFILES_PATH: '/Users/runner/Library/Developer/Xcode/UserData/Provisioning Profiles/'
  SCHEME: 'Lingua'
  SDK: 'macosx26.4'
  TARGET: 'Lingua'
  XCODE_VERSION: '26.4'

jobs:
  appStore:
    runs-on: macOS-26
    env:
      EXPORT_OPTIONS: 'Lingua/ExportOptions_macOS.plist'
      PROFILE_ID: 'b0bc92fb-02bc-4d09-bbce-d5a212567075'
    steps:
      - name: Toolchain
        shell: bash
        run: |
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Checkout
        uses: actions/checkout@v6

      - name: Certificates
        shell: bash
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          INSTALLER_CERTIFICATE_PATH=$RUNNER_TEMP/installer_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/certificate.keychain-db
          echo -n "${{ secrets.CERTIFICATE_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}" | base64 --decode -o $INSTALLER_CERTIFICATE_PATH
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "${{ secrets.CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $INSTALLER_CERTIFICATE_PATH -P "${{ secrets.INSTALLER_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Provisioning Profiles
        shell: bash
        run: |
          mkdir -p "$PROFILES_PATH"
          PROFILE_PATH="$PROFILES_PATH/$PROFILE_ID.provisionprofile"
          echo -n "${{ secrets.PROVISION_PROFILE_BASE64 }}" | base64 --decode -o "$PROFILE_PATH"
          ls -la "$PROFILES_PATH"

      - name: App Store Auth Key
        shell: bash
        run: |
          brew install asc
          mkdir private_keys
          ASC_KEY_PATH="$AUTH_KEY_PATH/$AUTH_KEY_NAME"
          echo -n "${{ secrets.AUTH_KEY_BASE64 }}" | base64 --decode -o $ASC_KEY_PATH
          chmod 600 $ASC_KEY_PATH
          asc auth login --key-id $AUTH_KEY_ID --issuer-id $AUTH_KEY_ISSUER_ID --private-key $ASC_KEY_PATH --name ASCAuthKey

      - name: Dependency Caching
        uses: actions/cache@v5
        with:
          path: |
            .build
            /Users/runner/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
            /Users/runner/Library/Caches/org.swift.swiftpm
            /Users/runner/Library/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Derived Data Caching
        uses: actions/cache@v5
        with:
          path: ${{ env.DERIVED_DATA }}
          key: ${{ env.SDK }}-derived-data-${{ hashFiles('**/*.xcodeproj/project.pbxproj', '**/*.xcworkspace/contents.xcworkspacedata') }}
          restore-keys: |
            ${{ env.SDK }}-derived-data-

      - name: Build & Archive
        shell: bash
        run: |
          xcodebuild \
          -scheme ${{ env.SCHEME }} \
          -target ${{ env.TARGET }} \
          -sdk ${{ env.SDK }} \
          -destination ${{ env.DESTINATION }} \
          -derivedDataPath ${{ env.DERIVED_DATA }} \
          -archivePath ${{ env.ARCHIVE_PATH }} \
          archive \
          2>&1 | xcbeautify

      - name: Export Archive
        shell: bash
        run: |
          xcodebuild \
          -exportArchive \
          -archivePath ${{ env.ARCHIVE_PATH }} \
          -exportPath ${{ env.EXPORT_PATH }} \
          -exportOptionsPlist ${{ env.EXPORT_OPTIONS }}

      - name: Upload
        shell: bash
        env:
          PKG_PATH: "${{ env.EXPORT_PATH }}/Lingua.pkg"
        run: |
          xcrun altool --validate-app -f $PKG_PATH -t macos --apiKey ${{ env.AUTH_KEY_ID }} --apiIssuer ${{ env.AUTH_KEY_ISSUER_ID }}
          xcrun altool --upload-app -f $PKG_PATH -t macos --apiKey ${{ env.AUTH_KEY_ID }} --apiIssuer ${{ env.AUTH_KEY_ISSUER_ID }}

      - name: Collect Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-appStore
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.EXPORT_PATH }}/Lingua.pkg
          retention-days: 7

  developerId:
    runs-on: macOS-26
    env:
      EXPORT_OPTIONS: 'Lingua/ExportOptions_DeveloperID.plist'
      PROFILE_ID: '25fbd0b2-fb58-4a00-91d8-00c09ec1d2d9'
    steps:
      - name: Toolchain
        shell: bash
        run: |
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Checkout
        uses: actions/checkout@v6

      - name: Certificates
        shell: bash
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          INSTALLER_CERTIFICATE_PATH=$RUNNER_TEMP/installer_certificate.p12
          DEVELOPER_ID_CERTIFICATE_PATH=$RUNNER_TEMP/developer_id_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/certificate.keychain-db
          echo -n "${{ secrets.CERTIFICATE_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}" | base64 --decode -o $INSTALLER_CERTIFICATE_PATH
          echo -n "${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}" | base64 --decode -o $DEVELOPER_ID_CERTIFICATE_PATH
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "${{ secrets.CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $INSTALLER_CERTIFICATE_PATH -P "${{ secrets.INSTALLER_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $DEVELOPER_ID_CERTIFICATE_PATH -P "${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Provisioning Profiles
        shell: bash
        run: |
          mkdir -p "$PROFILES_PATH"
          PROFILE_PATH="$PROFILES_PATH/$PROFILE_ID.provisionprofile"
          echo -n "${{ secrets.DEVELOPER_IDPROVISION_PROFILE_BASE64 }}" | base64 --decode -o "$PROFILE_PATH"
          ls -la "$PROFILES_PATH"

      - name: App Store Auth Key
        shell: bash
        run: |
          brew install asc
          mkdir private_keys
          ASC_KEY_PATH="$AUTH_KEY_PATH/$AUTH_KEY_NAME"
          echo -n "${{ secrets.AUTH_KEY_BASE64 }}" | base64 --decode -o $ASC_KEY_PATH
          chmod 600 $ASC_KEY_PATH
          asc auth login --key-id $AUTH_KEY_ID --issuer-id $AUTH_KEY_ISSUER_ID --private-key $ASC_KEY_PATH --name ASCAuthKey

      - name: Versioning
        shell: bash
        run: |
          JSON=$(asc builds list --app $APP_ID --sort "-uploadedDate" --limit 1 --output json)
          LAST_VERSION=$(echo $JSON | jq '.data[0].attributes.version | bc)
          NEXT_VERSION=$(bc -e "$LAST_VERSION+1")
          xcrun agvtool new-version $NEXT_VERSION

      - name: Dependency Caching
        uses: actions/cache@v5
        with:
          path: |
            .build
            /Users/runner/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
            /Users/runner/Library/Caches/org.swift.swiftpm
            /Users/runner/Library/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Derived Data Caching
        uses: actions/cache@v5
        with:
          path: ${{ env.DERIVED_DATA }}
          key: ${{ env.SDK }}-derived-data-${{ hashFiles('**/*.xcodeproj/project.pbxproj', '**/*.xcworkspace/contents.xcworkspacedata') }}
          restore-keys: |
            ${{ env.SDK }}-derived-data-

      - name: Build & Archive
        shell: bash
        run: |
          xcodebuild \
          -scheme ${{ env.SCHEME }} \
          -target ${{ env.TARGET }} \
          -sdk ${{ env.SDK }} \
          -destination ${{ env.DESTINATION }} \
          -derivedDataPath ${{ env.DERIVED_DATA }} \
          -archivePath ${{ env.ARCHIVE_PATH }} \
          archive \
          2>&1 | xcbeautify

      - name: Export Archive
        shell: bash
        run: |
          xcodebuild \
          -exportArchive \
          -archivePath ${{ env.ARCHIVE_PATH }} \
          -exportPath ${{ env.EXPORT_PATH }} \
          -exportOptionsPlist ${{ env.EXPORT_OPTIONS }}

      - name: Notarize
        shell: bash
        env:
          APP_PATH: "${{ env.EXPORT_PATH }}/Lingua.app"
          ZIP_PATH: "${{ env.EXPORT_PATH }}/Lingua.zip"
        run: |
          ditto -c -k --keepParent $APP_PATH $ZIP_PATH
          xcrun notarytool submit $ZIP_PATH -k ${{ env.AUTH_KEY_PATH }}/${{ env.AUTH_KEY_NAME }} -d ${{ env.AUTH_KEY_ID }} -i ${{ env.AUTH_KEY_ISSUER_ID }} --wait
          xcrun stapler staple $APP_PATH
          spctl --assess --verbose --type execute $APP_PATH

      - name: Collect Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-developerId
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.EXPORT_PATH }}/Lingua.app
          retention-days: 7
